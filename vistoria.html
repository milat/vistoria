      addSectionReportLine(room, lines, 'Janelas', () => {
        const windows = Array.from(room.querySelectorAll('[data-window]'));
        if (windows.length) {
          lines.push(`  • ${windows.map(describeWindow).join(' ')}`);
        }
      });

      addSectionReportLine(room, lines, 'Portas', () => {
        const doors = Array.from(room.querySelectorAll('[data-door]'));
        if (doors.length) {
          lines.push(`  • ${doors.map(describeDoor).join(' ')}`);
        }
      });

      addSectionReportLine(room, lines, 'Tomadas', () => {
        const outlets = Array.from(room.querySelectorAll('[data-outlet]'));
        if (outlets.length) {
          lines.push(`  • ${outlets.map((outlet, outletIndex) => describeFixture(`Tomada ${outletIndex + 1}`, outlet, 'outlet')).join(' ')}`);
        }
      });

      addSectionReportLine(room, lines, 'Interruptores', () => {
        const switches = Array.from(room.querySelectorAll('[data-switch]'));
        if (switches.length) {
          lines.push(`  • ${switches.map((switchItem, switchIndex) => describeFixture(`Interruptor ${switchIndex + 1}`, switchItem, 'switch')).join(' ')}`);
        }
      });

      const accessoriesVisible = !room.querySelector('[data-accessories-section]').classList.contains('d-none');
      addSectionReportLine(room, lines, 'Acessórios', () => {
        lines.push(`  • ${describeAccessories(room)}`);
      }, accessoriesVisible);

      const observation = valueIn(room, 'observation').trim();
      if (observation) {
        lines.push(`  • Observação: ${observation}.`);
      }

      return lines.join('\n');
    }

    function generateReport() {
      const rooms = Array.from(document.querySelectorAll('[data-room]'));
      if (!rooms.length) {
        addRoom();
      }

      const inspectionName = inspectionNameInput.value.trim() || 'Vistoria';
      const roomReport = Array.from(document.querySelectorAll('[data-room]'))
        .map(generateRoomParagraph)
        .join('\n\n');
      pendingReport = `${inspectionName}\n\n${roomReport}`;

      reportPreview.textContent = pendingReport;
      reportFeedback.textContent = '';
      reportFeedback.className = 'form-text mt-2';
      reportModal.show();
    }

    async function confirmReport() {
      try {
        await navigator.clipboard.writeText(pendingReport);
      } catch (error) {
        copyTextFallback(pendingReport);
      }

      downloadWordFile(pendingReport);
      localStorage.removeItem(storageKey);
      reportFeedback.textContent = 'Relatório copiado para a área de transferência e arquivo DOCX gerado.';
      reportFeedback.className = 'form-text mt-2 text-success';
      setTimeout(() => reportModal.hide(), 400);
    }

    function copyTextFallback(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
    }

    function escapeXml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&apos;');
    }

    function fileSafeName(text) {
      return (text || 'vistoria')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9_-]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .toLowerCase() || 'vistoria';
    }

    function downloadInspectionJson() {
      const data = buildInspectionData();
      const date = new Date().toISOString().slice(0, 10);
      const name = fileSafeName(data.inspectionName || 'vistoria');
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${name}-${date}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      reportFeedback.textContent = 'Arquivo JSON da vistoria salvo.';
      reportFeedback.className = 'form-text mt-2 text-primary';
    }

    function crc32(bytes) {
      if (!crc32.table) {
        crc32.table = Array.from({ length: 256 }, (_, index) => {
          let crc = index;
          for (let bit = 0; bit < 8; bit += 1) {
            crc = (crc & 1) ? (0xedb88320 ^ (crc >>> 1)) : (crc >>> 1);
          }
          return crc >>> 0;
        });
      }

      let crc = 0xffffffff;
      bytes.forEach((byte) => {
        crc = crc32.table[(crc ^ byte) & 0xff] ^ (crc >>> 8);
      });
      return (crc ^ 0xffffffff) >>> 0;
    }

    function uint16(value) {
      return [value & 0xff, (value >>> 8) & 0xff];
    }

    function uint32(value) {
      return [value & 0xff, (value >>> 8) & 0xff, (value >>> 16) & 0xff, (value >>> 24) & 0xff];
    }

    function concatBytes(parts) {
      const total = parts.reduce((sum, part) => sum + part.length, 0);
      const output = new Uint8Array(total);
      let offset = 0;
      parts.forEach((part) => {
        output.set(part, offset);
        offset += part.length;
      });
      return output;
    }

    function createZip(files) {
      const encoder = new TextEncoder();
      const localParts = [];
      const centralParts = [];
      let offset = 0;

      files.forEach((file) => {
        const nameBytes = encoder.encode(file.name);
        const data = typeof file.data === 'string' ? encoder.encode(file.data) : file.data;
        const crc = crc32(data);
        const localHeader = new Uint8Array([
          ...uint32(0x04034b50), ...uint16(20), ...uint16(0x0800), ...uint16(0),
          ...uint16(0), ...uint16(0), ...uint32(crc), ...uint32(data.length),
          ...uint32(data.length), ...uint16(nameBytes.length), ...uint16(0)
        ]);
        localParts.push(localHeader, nameBytes, data);

        const centralHeader = new Uint8Array([
          ...uint32(0x02014b50), ...uint16(20), ...uint16(20), ...uint16(0x0800),
          ...uint16(0), ...uint16(0), ...uint16(0), ...uint32(crc), ...uint32(data.length),
          ...uint32(data.length), ...uint16(nameBytes.length), ...uint16(0), ...uint16(0),
          ...uint16(0), ...uint16(0), ...uint32(0), ...uint32(offset)
        ]);
        centralParts.push(centralHeader, nameBytes);
        offset += localHeader.length + nameBytes.length + data.length;
      });

      const centralDirectory = concatBytes(centralParts);
      const endRecord = new Uint8Array([
        ...uint32(0x06054b50), ...uint16(0), ...uint16(0), ...uint16(files.length),
        ...uint16(files.length), ...uint32(centralDirectory.length), ...uint32(offset), ...uint16(0)
      ]);
      return concatBytes([...localParts, centralDirectory, endRecord]);
    }

    function paragraphXml(text, options = {}) {
      const indent = options.indent ? `<w:ind w:left="${options.indent}"/>` : '';
      const spacing = options.after === 0 ? '<w:spacing w:after="0"/>' : '<w:spacing w:after="160"/>';
      const bold = options.bold ? '<w:b/>' : '';
      return `<w:p><w:pPr>${spacing}${indent}</w:pPr><w:r><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="22"/>${bold}</w:rPr><w:t xml:space="preserve">${escapeXml(text)}</w:t></w:r></w:p>`;
    }

    function createDocumentXml(text) {
      const reportParts = text.split(/\n\s*\n/);
      const title = reportParts.shift() || 'Vistoria';
      const paragraphs = [paragraphXml(title, { bold: true })];

      reportParts.forEach((roomText) => {
        const lines = roomText.split('\n').filter(Boolean);
        lines.forEach((line, index) => {
          const isInner = /^\s+•/.test(line);
          const cleanLine = line.replace(/^\s*•\s*/, '');
          paragraphs.push(paragraphXml(`• ${cleanLine}`, {
            bold: index === 0,
            indent: isInner ? 720 : 360
          }));
        });
        paragraphs.push(paragraphXml('', { after: 0 }));
      });

      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:body>
    ${paragraphs.join('\n')}
    <w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440"/></w:sectPr>
  </w:body>
</w:document>`;
    }

    function downloadWordFile(text) {
      const title = text.split(/\n\s*\n/)[0] || 'Vistoria';
      const files = [
        {
          name: '[Content_Types].xml',
          data: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`
        },
        {
          name: '_rels/.rels',
          data: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`
        },
        {
          name: 'word/document.xml',
          data: createDocumentXml(text)
        }
      ];
      const blob = new Blob([createZip(files)], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const date = new Date().toISOString().slice(0, 10);
      link.href = url;
      link.download = `${fileSafeName(title)}-${date}.docx`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    restoreDraft();
  </script>
</body>
</html>
